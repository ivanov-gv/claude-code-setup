name: claude-code-sandbox

services:
  dind:
    image: cc-dind
    stdin_open: true
    tty: true
    privileged: true
    volumes:
      - dind-home:/home/dev

  golang-alpine:
    image: cc-golang-alpine
    stdin_open: true
    tty: true
    volumes:
      - golang-alpine-home:/home/dev

  golang-dind:
    image: cc-golang-dind
    stdin_open: true
    tty: true
    privileged: true
    volumes:
      - golang-dind-home:/home/dev

volumes:
  dind-home:
  golang-alpine-home:
  golang-dind-home:

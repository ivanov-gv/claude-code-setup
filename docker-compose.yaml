name: claude-code-sandbox

x-default: &default
    entrypoint: [ "/usr/local/bin/sandbox-init.sh" ]
    command: [ "sleep", "infinity" ]
    user: vscode
    working_dir: /home/vscode/workdir
    environment:
      CLAUDE_CODE_OAUTH_TOKEN: "${CLAUDE_CODE_OAUTH_TOKEN}"
      GH_CONTRIBUTE_APP_ID: "${GH_CONTRIBUTE_APP_ID}"
      GH_CONTRIBUTE_PRIVATE_KEY_PATH: "/home/vscode/.config/gh-contribute/private-key.pem"
    tmpfs:
      - /var/lib/docker

services:

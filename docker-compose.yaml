name: claude-code-sandbox

x-sandbox: &sandbox
  user: dev
  entrypoint: ["/usr/local/bin/sandbox-init.sh"]
  command: ["sleep", "infinity"]

services:
  dind:
    <<: *sandbox
    image: cc-dind
    privileged: true
    volumes:
      - dind-home:/home/dev
      - type: tmpfs
        target: /var/lib/docker

  golang:
    <<: *sandbox
    image: cc-golang
    cap_add:
      - NET_ADMIN
    volumes:
      - golang-home:/home/dev

  golang-dind:
    <<: *sandbox
    image: cc-golang-dind
    privileged: true
    volumes:
      - golang-dind-home:/home/dev
      - type: tmpfs
        target: /var/lib/docker

volumes:
  dind-home:
  golang-home:
  golang-dind-home:

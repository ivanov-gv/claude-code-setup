name: claude-code-sandbox

services:
  dind:
    image: cc-dind
    stdin_open: true
    tty: true
    privileged: true
    user: dev
    entrypoint: ["/bin/sh", "-c", "sudo init-firewall.sh && exec /usr/local/share/docker-init.sh \"$@\"", "--"]
    command: ["sleep", "infinity"]
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
      PATH: /home/dev/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - dind-home:/home/dev
      - type: tmpfs
        target: /var/lib/docker

  golang-alpine:
    image: cc-golang-alpine
    stdin_open: true
    tty: true
    user: dev
    cap_add:
      - NET_ADMIN
    entrypoint: ["/bin/sh", "-c", "sudo init-firewall.sh && exec bash"]
    environment:
      PATH: /home/dev/.local/bin:/usr/local/go/bin:/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - golang-alpine-home:/home/dev

  golang-dind:
    image: cc-golang-dind
    stdin_open: true
    tty: true
    privileged: true
    user: dev
    entrypoint: ["/bin/sh", "-c", "sudo init-firewall.sh && exec /usr/local/share/docker-init.sh \"$@\"", "--"]
    command: ["sleep", "infinity"]
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
      PATH: /home/dev/.local/bin:/usr/local/go/bin:/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      - golang-dind-home:/home/dev
      - type: tmpfs
        target: /var/lib/docker

volumes:
  dind-home:
  golang-alpine-home:
  golang-dind-home:
